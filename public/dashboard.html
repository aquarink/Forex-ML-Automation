<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forex Dashboard</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#081327; color:#f7fbff; }
    header { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; background:#0f1d37; border-bottom:1px solid #1f3a67; }
    .wrap { padding:16px; display:grid; grid-template-columns: 1fr 320px; gap:16px; }
    .panel { background:#0f1d37; border:1px solid #1f3a67; border-radius:12px; padding:12px; }
    #chart { height:460px; }
    .label { color:#9fb4d6; font-size:12px; }
    .big { font-size:26px; font-weight:700; margin-top:4px; }
    .bar { height:14px; width:100%; background:#1d2d4f; border-radius:10px; overflow:hidden; }
    .fill { height:100%; width:0%; transition:width .35s ease; }
    .buy { background:#1bc47d; }
    .sell { background:#ff5b61; }
    .hold { background:#ffd166; }
    .signal-detail { margin-top:12px; font-size:13px; line-height:1.5; color:#d6e2f5; }
    .warn { margin-top:10px; color:#ffd166; font-size:12px; }
    button { background:#243d67; color:#fff; border:0; border-radius:8px; padding:8px 12px; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <div>Dashboard Realtime Forex</div>
    <form method="POST" action="/logout"><button type="submit">Logout</button></form>
  </header>
  <div class="wrap">
    <div class="panel">
      <div id="chart"></div>
    </div>
    <div class="panel">
      <div class="label">Predicted Signal</div>
      <div class="big" id="signalType">HOLD</div>
      <div class="label">Open Position</div>
      <div class="big" id="openPosition">NONE</div>
      <div class="label">Confidence</div>
      <div class="bar"><div id="confidenceFill" class="fill hold"></div></div>
      <div id="confidenceText" style="margin-top:6px">0%</div>
      <div class="warn" id="fallbackWarn" style="display:none">Using fallback/mock data</div>
      <hr style="border-color:#1f3a67; margin:14px 0">
      <div class="label">Marker Detail</div>
      <div class="signal-detail" id="markerDetail">Klik marker BUY/SELL untuk lihat detail.</div>
    </div>
  </div>

  <script src="https://unpkg.com/lightweight-charts@5.0.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    const symbol = 'EUR/USD';
    const timeframe = 'M5';
    const openPosition = 'NONE';
    let provider = 'alphavantage';

    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
      layout: { background: { color: '#0f1d37' }, textColor: '#d6e2f5' },
      grid: { vertLines: { color: '#1a2f55' }, horzLines: { color: '#1a2f55' } },
      rightPriceScale: { borderColor: '#315089' },
      timeScale: { borderColor: '#315089' },
      width: document.getElementById('chart').clientWidth,
      height: 460,
    });

    const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
      wickUpColor: '#26a69a', wickDownColor: '#ef5350'
    });

    let markers = [];
    let markerApi = null;
    let lastCandleTime = null;

    function updateMarkers(nextMarkers) {
      try {
        if (markerApi) {
          markerApi.setMarkers(nextMarkers);
          return;
        }
        markerApi = LightweightCharts.createSeriesMarkers(candleSeries, nextMarkers);
      } catch (err) {
        console.error('marker update failed', err);
      }
    }

    function updateSignalVisual(type, confidence) {
      document.getElementById('signalType').textContent = type;
      document.getElementById('openPosition').textContent = openPosition;
      const fill = document.getElementById('confidenceFill');
      fill.style.width = Math.round(confidence * 100) + '%';
      fill.className = 'fill ' + (type === 'BUY' ? 'buy' : type === 'SELL' ? 'sell' : 'hold');
      document.getElementById('confidenceText').textContent = Math.round(confidence * 100) + '%';
    }

    function addSignalMarker(signal, confidence, candleTime) {
      if (confidence < 0.6) return;
      const marker = signal === 'BUY'
        ? { time: candleTime, position: 'belowBar', color: '#00ff99', shape: 'arrowUp', text: 'BUY' }
        : { time: candleTime, position: 'aboveBar', color: '#ff4d4d', shape: 'arrowDown', text: 'SELL' };
      markers.push(marker);
      console.log('markers', markers);
      updateMarkers(markers);
    }

    async function loadInitial() {
      const health = await fetch('/health').then(r => r.json()).catch(() => ({ usingFallbackData: true, forexProvider: 'alphavantage' }));
      provider = health.forexProvider || 'alphavantage';
      document.getElementById('fallbackWarn').style.display = health.usingFallbackData ? 'block' : 'none';

      const candles = await fetch(`/api/candles/history?provider=${encodeURIComponent(provider)}&symbol=${encodeURIComponent(symbol)}&timeframe=${timeframe}&limit=200`).then(r => r.json());
      console.log('history candles', candles.length);
      candleSeries.setData(candles);
      if (candles.length > 0) lastCandleTime = candles[candles.length - 1].time;

      const signalResp = await fetch(`/signals/generate?symbol=${encodeURIComponent(symbol)}&timeframe=${timeframe}`).then(r => r.json()).catch(() => null);
      if (signalResp && signalResp.ok) {
        const signal = String(signalResp.signal || 'HOLD').toUpperCase();
        const confidence = Number(signalResp.confidence || 0) / 100;
        console.log('predicted signal', signal);
        updateSignalVisual(signal, confidence);
        if (signal !== 'HOLD' && candles.length > 0) {
          addSignalMarker(signal, confidence, candles[candles.length - 1].time);
        }
      }
    }

    const evt = new EventSource('/dashboard/stream');
    evt.onopen = () => console.log('websocket connected');
    evt.onmessage = (msg) => {
      const event = JSON.parse(msg.data);
      if (event.type === 'candle') {
        const c = event.payload;
        const payload = {
          time: Math.floor(new Date(c.ts).getTime() / 1000),
          open: Number(c.open), high: Number(c.high), low: Number(c.low), close: Number(c.close),
        };
        console.log('realtime candle received', payload);
        candleSeries.update(payload);
        lastCandleTime = payload.time;
      }
      if (event.type === 'signal') {
        const s = event.payload;
        const signal = String(s.signal_type || 'HOLD').toUpperCase();
        const confidence = Number(s.confidence || 0) / 100;
        console.log('predicted signal', signal);
        updateSignalVisual(signal, confidence);
        if (signal !== 'HOLD') {
          const candleTime = Math.floor(new Date(s.candle_time).getTime() / 1000);
          addSignalMarker(signal, confidence, candleTime);
        }
      }
    };

    setInterval(async () => {
      try {
        const latestList = await fetch(`/api/candles/latest?provider=${encodeURIComponent(provider)}&symbol=${encodeURIComponent(symbol)}&timeframe=${timeframe}&limit=1`).then(r => r.json());
        const latest = latestList && latestList[0];
        console.log('latest candle', latest);
        if (!latest) return;

        if (!lastCandleTime || latest.time > lastCandleTime) {
          candleSeries.update(latest);
          lastCandleTime = latest.time;
        } else if (latest.time === lastCandleTime) {
          candleSeries.update(latest);
        }
      } catch (err) {
        console.error('polling failed', err);
      }
    }, 30000);

    window.addEventListener('resize', () => chart.applyOptions({ width: document.getElementById('chart').clientWidth }));
    loadInitial();
  </script>
</body>
</html>
